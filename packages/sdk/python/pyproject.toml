[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "boxer-sdk"
version = "0.1.0"
description = "Python SDK for the Boxer sandboxed container execution service"
requires-python = ">=3.9"
dependencies = ["httpx>=0.27"]
readme = "README.md"
license = { text = "Apache 2.0" }
authors = [{ name = "Alexander Kolupaev", email = "theonekeyg@gmail.com" }]
urls.Homepage = "https://github.com/theonekeyg/boxer"

[project.optional-dependencies]
dev = ["pytest", "pytest-asyncio", "anyio", "ruff"]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"

[tool.ruff]
target-version = "py39"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "S",   # flake8-bandit (security)
    "RUF", # ruff-specific
]
ignore = [
    "S101", # assert statements (used in tests)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S"] # disable security checks in tests
