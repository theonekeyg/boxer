basePath: /
definitions:
  api.ErrorResponse:
    properties:
      error:
        example: 'image pull failed: not found'
        type: string
    type: object
  api.RunRequest:
    properties:
      cmd:
        items:
          type: string
        minItems: 1
        type: array
      cwd:
        example: /app
        type: string
      env:
        example:
        - HOME=/root
        items:
          type: string
        type: array
      image:
        example: python:3.12-slim
        type: string
      limits:
        $ref: '#/definitions/config.ResourceLimits'
    required:
    - cmd
    - image
    type: object
  api.RunResponse:
    properties:
      exit_code:
        example: 0
        type: integer
      stderr:
        example: ""
        type: string
      stdout:
        example: |
          hello world
        type: string
      wall_ms:
        example: 342
        type: integer
    type: object
  config.ResourceLimits:
    properties:
      cpu_cores:
        type: number
      memory_mb:
        type: integer
      nofile:
        type: integer
      pids_limit:
        type: integer
      wall_clock_secs:
        type: integer
    type: object
host: localhost:8080
info:
  contact: {}
  description: 'Sandbox execution service: pull any container image, run arbitrary
    commands inside gVisor.'
  license:
    name: MIT
  title: Boxer API
  version: "1.0"
paths:
  /healthz:
    get:
      description: 'Returns {"ok": true} when the service is running'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
      summary: Health check
      tags:
      - system
  /run:
    post:
      consumes:
      - application/json
      description: |-
        Pulls the image if not cached, then runs the command inside a
        gVisor sandbox. Returns stdout, stderr, exit code, and wall time.
      parameters:
      - description: Execution parameters
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.RunRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Command completed (any exit code)
          schema:
            $ref: '#/definitions/api.RunResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "408":
          description: Wall-clock timeout exceeded
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "500":
          description: Internal error (pull failed, runsc error)
          schema:
            $ref: '#/definitions/api.ErrorResponse'
        "507":
          description: Output exceeded limit
          schema:
            $ref: '#/definitions/api.ErrorResponse'
      summary: Execute a command in a sandboxed container
      tags:
      - execution
swagger: "2.0"
